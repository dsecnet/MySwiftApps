version: "3.9"

services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: menzilim-api
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql+asyncpg://menzilim:menzilim_secret@postgres:5432/menzilim
      - REDIS_URL=redis://redis:6379/0
      - JWT_SECRET_KEY=change-this-to-a-long-random-string-in-production
      - DEBUG=true
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./uploads:/app/uploads
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    container_name: menzilim-postgres
    environment:
      POSTGRES_USER: menzilim
      POSTGRES_PASSWORD: menzilim_secret
      POSTGRES_DB: menzilim
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U menzilim"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: menzilim-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
